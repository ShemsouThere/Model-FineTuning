seed: 3407

dataset:
  sample_size: 20
  output_root: "data/processed/colab_smoke"
  split:
    train_ratio: 0.80
    val_ratio: 0.20
    test_ratio: 0.00

model:
  base_model_name: "unsloth/Qwen2.5-Coder-7B-Instruct-bnb-4bit"
  max_seq_length: 1536
  lora:
    r: 16
    alpha: 32

training:
  output_dir: "artifacts/colab_smoke_qwen25_coder"
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  warmup_ratio: 0.10
  num_train_epochs: 10
  max_steps: null
  logging_steps: 1
  eval_steps: 5
  save_steps: 5
  save_total_limit: 2
  report_to: "none"

export:
  save_adapter: true
  save_merged_16bit: false
  save_gguf: false
